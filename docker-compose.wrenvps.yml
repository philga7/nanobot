##### Optional override for WrenVPS instance #####
# Usage: docker compose -f docker-compose.yml -f docker-compose.wrenvps.yml --env-file .env.wrenvps up -d
# Ensure ~/.wrenvps/config.json exists and:
#   - configures tools.mcpServers.memento.env.MEMENTO_DB_PATH to /root/.wrenvps/memento.db
#   - sets tools.web.search.searxngUrl to http://searxng_vps:8080 (or your chosen backend)

services:
  bird-api:
    env_file:
      - .env.wrenvps

  nanobot-gateway:
    env_file:
      - .env.wrenvps
    volumes:
      - ~/.wrenvps:/root/.wrenvps
    command: ["gateway", "--config", "/root/.wrenvps/config.json"]

  # Separate SearXNG instance for WrenVPS to avoid
  # container-name / port conflicts with any existing searxng.
  searxng:
    container_name: searxng_vps
    env_file:
      - .env.wrenvps
    ports:
      - "8082:8080"
