##### Optional override for WrenVPS instance #####
# Usage: docker compose -f docker-compose.yml -f docker-compose.wrenvps.yml up -d
# Ensure ~/.wrenvps/config.json exists and sets tools.web.search.searxngUrl to http://localhost:8081 (or your chosen backend)

services:
  nanobot-gateway:
    env_file:
      - .env.wrenvps
    volumes:
      - ~/.wrenvps:/root/.wrenvps
    command: ["gateway", "--config", "/root/.wrenvps/config.json"]

  # Separate SearXNG instance for WrenVPS to avoid
  # container-name / port conflicts with any existing searxng.
  searxng:
    container_name: searxng_vps
    env_file:
      - .env.wrenvps
    ports:
      - "8081:8080"
