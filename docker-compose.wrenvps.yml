##### Optional override for WrenVPS instance #####
# Usage: docker compose -f docker-compose.yml -f docker-compose.wrenvps.yml --env-file .env.wrenvps up -d
# This override keeps SearXNG containerized for the WrenVPS instance while
# running the nanobot gateway natively via systemd on the host.

services:
  # Separate SearXNG instance for WrenVPS to avoid
  # container-name / port conflicts with any existing searxng.
  # Config is stored on the host at ~/.wrenvps/searxng/ (e.g. settings.yml).
  searxng:
    image: searxng/searxng:latest
    container_name: searxng_vps
    env_file:
      - .env.wrenvps
    # Host 8082 = external access (e.g. curl from outside). Container-to-container = searxng_vps:8080.
    ports:
      - "8082:8080"
    volumes:
      - ~/.wrenvps/searxng:/etc/searxng

  bird-api:
    build:
      context: ./services/bird-api
    env_file:
      - .env.wrenvps
    ports:
      # Host 18791 = external access (e.g. curl from outside).
      # Container-to-container = bird-api:18791.
      - "18791:18791"
