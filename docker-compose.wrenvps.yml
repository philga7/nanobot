##### Optional override for WrenVPS instance #####
# Usage: docker compose -f docker-compose.yml -f docker-compose.wrenvps.yml --env-file .env.wrenvps up -d
# Ensure ~/.wrenvps/config.json exists and:
#   - sets tools.web.search.provider to "searxng" and baseUrl to http://searxng_vps:8080
# SearXNG config on the VPS: ~/.wrenvps/searxng/ (e.g. settings.yml). Create it before first run:
#   mkdir -p ~/.wrenvps/searxng

services:
  bird-api:
    env_file:
      - .env.wrenvps

  nanobot-gateway:
    env_file:
      - .env.wrenvps
    volumes:
      - ~/.wrenvps:/root/.wrenvps
      # Persist cron jobs across rebuilds
      - wrenvps-cron:/root/.wrenvps/cron
    command: ["gateway", "--config", "/root/.wrenvps/config.json"]

  hindsight:
    env_file:
      - .env.wrenvps
    volumes:
      - ~/.wrenvps/hindsight:/home/hindsight/.pg0

  # Separate SearXNG instance for WrenVPS to avoid
  # container-name / port conflicts with any existing searxng.
  # Config is stored on the host at ~/.wrenvps/searxng/ (e.g. settings.yml).
  searxng:
    container_name: searxng_vps
    env_file:
      - .env.wrenvps
    # Host 8082 = external access (e.g. curl from outside). Container-to-container = searxng_vps:8080.
    ports:
      - "8082:8080"
    volumes:
      - ~/.wrenvps/searxng:/etc/searxng

volumes:
  wrenvps-cron:
