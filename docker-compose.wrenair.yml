# Optional override for WrenAir instance.
# Usage: docker compose -f docker-compose.yml -f docker-compose.wrenair.yml up -d
# This override keeps SearXNG containerized for the WrenAir instance while
# running the nanobot gateway natively via launchd on the host.

services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng_wrenair
    env_file:
      - .env.wrenair
    # Host 8083 = external access (e.g. curl from the Mac). Container-to-container = searxng_wrenair:8080.
    ports:
      - "8083:8080"
    volumes:
      - ~/.wrenair/searxng:/etc/searxng

  bird-api:
    build:
      context: ./services/bird-api
    env_file:
      - .env.wrenair
    ports:
      # Host 18791 = external access (e.g. curl from the Mac).
      # Container-to-container = bird-api:18791.
      - "18791:18791"
