x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ~/.nanobot:/root/.nanobot
    # Persist cron jobs across rebuilds (same pattern as searxng-data, hindsight-data)
    - nanobot-cron:/root/.nanobot/cron

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    ports:
      - 18790:18790
    deploy:
      resources:
        limits:
          # Allow more headroom for embedded MCP servers and Hindsight memory.
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M

  bird-api:
    build:
      context: ./services/bird-api
      dockerfile: Dockerfile
    container_name: bird-api
    restart: unless-stopped
    ports:
      - "18791:18791"
    environment:
      - PORT=18791

  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    container_name: hindsight
    restart: unless-stopped
    ports:
      - "8888:8888"
      - "9999:9999"
    volumes:
      - hindsight-data:/home/hindsight/.pg0
    environment:
      - HINDSIGHT_API_HOST=0.0.0.0
      - HINDSIGHT_API_PORT=8888

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8082:8080"
    volumes:
      - searxng-data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8082/

  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true

volumes:
  searxng-data:
  hindsight-data:
  nanobot-cron:
