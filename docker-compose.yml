x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ~/.nanobot:/root/.nanobot

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    ports:
      - 18790:18790
    deploy:
      resources:
        limits:
          # Allow more headroom for embedded MCP servers like Memento,
          # which can use additional memory during vectorization/search.
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M

  bird-api:
    build:
      context: ./services/bird-api
      dockerfile: Dockerfile
    container_name: bird-api
    restart: unless-stopped
    ports:
      - "18791:18791"
    environment:
      - PORT=18791

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8082:8080"
    volumes:
      - searxng-data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8082/

  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true

volumes:
  searxng-data:
